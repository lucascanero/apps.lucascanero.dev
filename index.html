  <style>
    /* ============================================================
   Tokens — same system as lucascanero.dev
   ============================================================ */
    :root,
    :root[data-theme="dark"] {
      --bg: #0b0c0e;
      --bg-2: #0e1013;
      --panel: #121418;
      --line: #23262b;
      --text: #ebe9e4;
      --text-2: #a29d92;
      --accent: #ffb454;
      --accent-ink: #241300;
      --accent-dim: rgba(255, 180, 84, .12);
      --accent-glow: rgba(255, 180, 84, .30);
      --ok: #3ecf8e;
      --ok-glow: rgba(62, 207, 142, .35);
      --warn: #ffb454;
      --nav-bg: rgba(11, 12, 14, .78);
      --shadow: 0 18px 50px rgba(0, 0, 0, .45);
    }

    :root[data-theme="light"] {
      --bg: #f6f6f3;
      --bg-2: #efeeea;
      --panel: #ffffff;
      --line: #e3e1da;
      --text: #1a1814;
      --text-2: #5f5b52;
      --accent: #9a5b00;
      --accent-ink: #ffffff;
      --accent-dim: rgba(154, 91, 0, .10);
      --accent-glow: rgba(154, 91, 0, .18);
      --ok: #0f9960;
      --ok-glow: rgba(15, 153, 96, .25);
      --warn: #9a5b00;
      --nav-bg: rgba(246, 246, 243, .82);
      --shadow: 0 18px 50px rgba(35, 30, 20, .10);
    }

    /* ============================================================
   Base
   ============================================================ */
    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0
    }

    html {
      scroll-behavior: smooth
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Space Grotesk', ui-sans-serif, system-ui, sans-serif;
      font-size: 16.5px;
      line-height: 1.65;
      -webkit-font-smoothing: antialiased;
      transition: background .35s ease, color .35s ease;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    .mono {
      font-family: 'JetBrains Mono', ui-monospace, SFMono-Regular, Menlo, monospace
    }

    a {
      color: inherit;
      text-decoration: none
    }

    ul {
      list-style: none
    }

    ::selection {
      background: var(--accent);
      color: var(--accent-ink)
    }

    :focus-visible {
      outline: 2px solid var(--accent);
      outline-offset: 3px;
      border-radius: 4px
    }

    .container {
      width: 100%;
      max-width: 1020px;
      margin-inline: auto;
      padding-inline: clamp(1.25rem, 5vw, 2.5rem)
    }

    .accent {
      color: var(--accent)
    }

    /* ============================================================
   Nav
   ============================================================ */
    .nav {
      position: fixed;
      inset: 0 0 auto 0;
      z-index: 50;
      height: 64px;
      background: var(--nav-bg);
      -webkit-backdrop-filter: blur(12px);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--line);
    }

    .nav-in {
      height: 100%;
      display: flex;
      align-items: center;
      gap: 1.25rem
    }

    .logo {
      font-size: .95rem;
      font-weight: 500;
      letter-spacing: -.01em
    }

    .logo:hover .accent {
      text-shadow: 0 0 12px var(--accent-glow)
    }

    .nav-ctrl {
      display: flex;
      align-items: center;
      gap: .75rem;
      margin-left: auto
    }

    .back-link {
      font-family: 'JetBrains Mono', monospace;
      font-size: .8rem;
      color: var(--text-2);
      transition: color .2s
    }

    .back-link:hover {
      color: var(--accent)
    }

    @media (max-width:560px) {
      .back-link {
        display: none
      }
    }

    .lang {
      display: flex;
      align-items: center;
      gap: .15rem;
      font-size: .8rem
    }

    .lang-btn {
      background: none;
      border: 0;
      cursor: pointer;
      color: var(--text-2);
      font-family: inherit;
      font-size: inherit;
      padding: .3rem .35rem;
      border-radius: 6px;
      transition: color .2s;
    }

    .lang-btn:hover {
      color: var(--text)
    }

    .lang-btn.is-active {
      color: var(--accent);
      font-weight: 700
    }

    .lang-sep {
      color: var(--line)
    }

    .icon-btn {
      background: none;
      border: 1px solid var(--line);
      cursor: pointer;
      color: var(--text-2);
      width: 36px;
      height: 36px;
      border-radius: 9px;
      display: grid;
      place-items: center;
      transition: color .2s, border-color .2s, transform .2s;
    }

    .icon-btn:hover {
      color: var(--accent);
      border-color: var(--accent);
      transform: translateY(-1px)
    }

    .icon-btn svg {
      width: 17px;
      height: 17px
    }

    [data-theme="dark"] .icon-sun {
      display: block
    }

    [data-theme="dark"] .icon-moon {
      display: none
    }

    [data-theme="light"] .icon-sun {
      display: none
    }

    [data-theme="light"] .icon-moon {
      display: block
    }

    /* ============================================================
   Header
   ============================================================ */
    .head {
      position: relative;
      overflow: hidden;
      padding: clamp(7rem, 15vh, 9.5rem) 0 clamp(2.2rem, 5vh, 3.2rem);
    }

    .head::before {
      content: '';
      position: absolute;
      inset: 0;
      pointer-events: none;
      background-image:
        linear-gradient(var(--line) 1px, transparent 1px),
        linear-gradient(90deg, var(--line) 1px, transparent 1px);
      background-size: 44px 44px;
      opacity: .28;
      -webkit-mask-image: radial-gradient(75% 60% at 50% 22%, #000 0%, transparent 100%);
      mask-image: radial-gradient(75% 60% at 50% 22%, #000 0%, transparent 100%);
    }

    .head-glow {
      position: absolute;
      top: -220px;
      right: -160px;
      width: 560px;
      height: 560px;
      pointer-events: none;
      background: radial-gradient(closest-side, var(--accent-dim), transparent 70%);
      filter: blur(6px);
    }

    .head-in {
      position: relative
    }

    .head-in>* {
      opacity: 0;
      animation: rise .7s cubic-bezier(.2, .7, .2, 1) forwards
    }

    .head-in>*:nth-child(1) {
      animation-delay: .05s
    }

    .head-in>*:nth-child(2) {
      animation-delay: .12s
    }

    .head-in>*:nth-child(3) {
      animation-delay: .2s
    }

    .head-in>*:nth-child(4) {
      animation-delay: .3s
    }

    .head-in>*:nth-child(5) {
      animation-delay: .42s
    }

    @keyframes rise {
      from {
        opacity: 0;
        transform: translateY(18px)
      }

      to {
        opacity: 1;
        transform: none
      }
    }

    .kicker {
      font-size: .82rem;
      color: var(--accent);
      letter-spacing: .02em;
      margin-bottom: 1rem
    }

    .page-title {
      font-size: clamp(2.2rem, 7vw, 4rem);
      font-weight: 700;
      line-height: 1.05;
      letter-spacing: -.03em;
      margin-bottom: .6rem;
    }

    .page-sub {
      max-width: 52ch;
      color: var(--text-2);
      margin-bottom: 1.6rem
    }

    /* Global status pill */
    .sys-status {
      display: inline-flex;
      align-items: center;
      gap: .55rem;
      font-family: 'JetBrains Mono', monospace;
      font-size: .78rem;
      color: var(--text-2);
      border: 1px solid var(--line);
      border-radius: 999px;
      padding: .42rem .9rem;
      margin-bottom: 2rem;
      background: var(--panel);
    }

    .sys-status b {
      color: var(--text);
      font-weight: 500
    }

    /* Status LEDs */
    .led {
      width: 9px;
      height: 9px;
      border-radius: 50%;
      flex-shrink: 0;
      background: var(--text-2);
    }

    .led.ok {
      background: var(--ok);
      box-shadow: 0 0 8px var(--ok-glow);
      animation: ledPulse 2s ease-in-out infinite;
    }

    .led.warn {
      background: var(--warn);
      box-shadow: 0 0 8px var(--accent-glow);
    }

    .led.wait {
      animation: ledPulse 1.1s ease-in-out infinite
    }

    @keyframes ledPulse {
      50% {
        opacity: .45
      }
    }

    /* Terminal — same signature as the main site */
    .term {
      max-width: 640px;
      border-radius: 12px;
      overflow: hidden;
      border: 1px solid var(--line);
      background: #0e0f12;
      box-shadow: var(--shadow);
    }

    .term-bar {
      display: flex;
      align-items: center;
      gap: .45rem;
      padding: .6rem .9rem;
      background: #15161a;
      border-bottom: 1px solid #212227
    }

    .term-bar .dot {
      width: 11px;
      height: 11px;
      border-radius: 50%;
      background: #3a3c41
    }

    .term-title {
      margin-left: .4rem;
      font-size: .72rem;
      color: #7a766c;
      font-family: 'JetBrains Mono', monospace
    }

    .term-body {
      position: relative;
      padding: 1.1rem 1.2rem 1.3rem;
      font-family: 'JetBrains Mono', monospace;
      font-size: .82rem;
      line-height: 1.85;
      color: #c9c4b8;
      min-height: 7.4em;
      white-space: pre;
      overflow-x: auto;
    }

    .term-body::after {
      content: '';
      position: absolute;
      inset: 0;
      pointer-events: none;
      background: repeating-linear-gradient(0deg, rgba(255, 255, 255, .03) 0 1px, transparent 1px 3px);
    }

    .t-prompt {
      color: #ffb454;
      text-shadow: 0 0 10px rgba(255, 180, 84, .28)
    }

    .t-out {
      color: #a29d92
    }

    .t-ok {
      color: #3ecf8e
    }

    .t-caret {
      display: inline-block;
      width: .58ch;
      height: 1.05em;
      vertical-align: text-bottom;
      background: #ffb454;
      box-shadow: 0 0 10px rgba(255, 180, 84, .5);
      animation: blink 1.05s steps(1) infinite;
    }

    @keyframes blink {
      50% {
        opacity: 0
      }
    }

    /* ============================================================
   Apps grid
   ============================================================ */
    .apps-sec {
      padding: clamp(2.2rem, 5vh, 3.4rem) 0 clamp(4rem, 9vh, 6rem);
      flex-grow: 1;
    }

    .cards {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(min(100%, 300px), 1fr));
      gap: 1.15rem
    }

    .card {
      position: relative;
      display: flex;
      flex-direction: column;
      gap: .7rem;
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 1.35rem 1.35rem 1.15rem;
      transition: transform .18s ease, border-color .18s ease, box-shadow .18s ease;
      will-change: transform;
    }

    .card::after {
      content: '';
      position: absolute;
      inset: 0;
      border-radius: inherit;
      pointer-events: none;
      background: radial-gradient(230px circle at var(--mx, 50%) var(--my, 30%), var(--accent-dim), transparent 65%);
      opacity: 0;
      transition: opacity .25s ease;
    }

    .card:hover {
      border-color: var(--accent);
      box-shadow: 0 14px 34px var(--accent-dim)
    }

    .card:hover::after {
      opacity: 1
    }

    @media (hover:hover) {
      .card:hover {
        transform: translateY(-4px)
      }
    }

    .card-top {
      display: flex;
      align-items: center;
      gap: .6rem
    }

    .card-icon {
      width: 30px;
      height: 30px;
      border-radius: 7px;
      flex-shrink: 0;
    }

    .card-top h3 {
      font-family: 'JetBrains Mono', monospace;
      font-size: .95rem;
      font-weight: 500;
      color: var(--accent);
      word-break: break-word;
    }

    .status-badge {
      display: inline-flex;
      align-items: center;
      gap: .4rem;
      margin-left: auto;
      font-family: 'JetBrains Mono', monospace;
      font-size: .68rem;
      color: var(--text-2);
      border: 1px solid var(--line);
      border-radius: 999px;
      padding: .18rem .6rem;
      white-space: nowrap;
    }

    .status-badge.is-ok {
      color: var(--ok);
      border-color: var(--ok)
    }

    .status-badge.is-warn {
      color: var(--warn);
      border-color: var(--warn)
    }

    .card-desc {
      font-size: .92rem;
      color: var(--text-2);
      flex-grow: 1
    }

    .tags {
      display: flex;
      flex-wrap: wrap;
      gap: .4rem
    }

    .tags li {
      font-family: 'JetBrains Mono', monospace;
      font-size: .66rem;
      color: var(--text-2);
      border: 1px solid var(--line);
      border-radius: 999px;
      padding: .16rem .55rem;
    }

    .card-meta {
      display: flex;
      align-items: center;
      gap: .8rem;
      margin-top: .2rem;
      font-family: 'JetBrains Mono', monospace;
      font-size: .72rem;
      color: var(--text-2);
    }

    .card-arrow {
      margin-left: auto;
      color: var(--accent);
      transition: transform .2s ease
    }

    .card:hover .card-arrow {
      transform: translate(3px, -3px)
    }

    /* Tiny activity equalizer — implies a running app */
    .eq {
      display: inline-flex;
      align-items: flex-end;
      gap: 2px;
      height: 12px;
    }

    .eq span {
      width: 3px;
      border-radius: 1px;
      background: var(--ok);
      opacity: .85;
      animation: eqBar 1.1s ease-in-out infinite;
      transform-origin: bottom;
      height: 100%;
    }

    .eq span:nth-child(1) {
      animation-delay: 0s
    }

    .eq span:nth-child(2) {
      animation-delay: -.35s
    }

    .eq span:nth-child(3) {
      animation-delay: -.7s
    }

    .eq span:nth-child(4) {
      animation-delay: -.15s
    }

    @keyframes eqBar {

      0%,
      100% {
        transform: scaleY(.25)
      }

      35% {
        transform: scaleY(1)
      }

      70% {
        transform: scaleY(.5)
      }
    }

    .card.is-warn .eq span {
      background: var(--warn);
      animation-play-state: paused;
      transform: scaleY(.25);
    }

    /* Empty slot — next deploy */
    .slot {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 210px;
      border: 1px dashed var(--line);
      border-radius: 14px;
      color: var(--text-2);
      font-family: 'JetBrains Mono', monospace;
      font-size: .8rem;
      text-align: center;
      padding: 1.2rem;
    }

    .slot .t-caret {
      margin-left: .35rem;
      height: .95em
    }

    /* ============================================================
   Footer
   ============================================================ */
    footer {
      border-top: 1px solid var(--line);
      padding: 2rem 0 2.4rem
    }

    .foot {
      display: flex;
      flex-wrap: wrap;
      gap: .8rem 1.6rem;
      align-items: center;
      font-size: .76rem;
      color: var(--text-2)
    }

    .foot a {
      color: var(--text-2);
      transition: color .2s
    }

    .foot a:hover {
      color: var(--accent)
    }

    .foot-made {
      margin-left: auto
    }

    @media (max-width:560px) {
      .foot-made {
        margin-left: 0
      }
    }

    /* ============================================================
   Reduced motion
   ============================================================ */
    @media (prefers-reduced-motion:reduce) {
      html {
        scroll-behavior: auto
      }

      *,
      *::before,
      *::after {
        animation: none !important;
        transition: none !important
      }

      .head-in>* {
        opacity: 1;
        transform: none
      }
    }
  </style>
</head>

          'slot.next': "// próxima app em breve",
          'card.open': "abrir app",
          'footer.made': "deployed & monitorizado com ❤"
        }
      };

      /* ---------------- App registry ----------------
         Add a new object here and the page does the rest:
         card, health check, terminal row, global status.   */
      var APPS = [
        {
          slug: 'eDreams Flex Scanner',
          url: './edreams-flex-scanner/',
          icon: './edreams-flex-scanner/img/icons/icon128.png',
          tags: ['Chrome Extension'],
          desc: {
            en: "Chrome extension that scans flexible date ranges on eDreams to surface the cheapest flight combinations.",
            pt: "Extensão Chrome que percorre intervalos de datas flexíveis no eDreams para encontrar as combinações de voos mais baratas."
          },
          state: 'check',   /* check | ok | warn */
          ms: null,
          checkedAt: null
        }
      ];

      var lang = 'en';

      /* ---------------- Theme ---------------- */
      var themeBtn = $('#themeBtn');
      function setTheme(t) {
        d.documentElement.setAttribute('data-theme', t);
        var m = $('meta[name="theme-color"]');
        if (m) m.setAttribute('content', t === 'dark' ? '#0b0c0e' : '#f6f6f3');
      }
      themeBtn.addEventListener('click', function () {
        setTheme(d.documentElement.getAttribute('data-theme') === 'dark' ? 'light' : 'dark');
      });

      /* ---------------- Language ---------------- */
      function applyLang(l) {
        lang = l;
        d.documentElement.lang = l === 'pt' ? 'pt' : 'en';
        var dict = I18N[l];
        $$('[data-i18n]').forEach(function (el) {
          var k = el.getAttribute('data-i18n');
          if (dict[k] != null) el.textContent = dict[k];
        });
        /* keep the accent dot in the title */
        var h = $('.page-title');
        h.innerHTML = '';
        h.appendChild(d.createTextNode(dict['page.title'].replace(/\.$/, '')));
        var dot = d.createElement('span');
        dot.className = 'accent';
        dot.textContent = '.';
        h.appendChild(dot);
        themeBtn.setAttribute('aria-label', dict['aria.theme']);
        $$('.lang-btn').forEach(function (b) {
          b.classList.toggle('is-active', b.getAttribute('data-lang') === l);
        });
        renderCards();
        renderSystem();
      }
      $$('.lang-btn').forEach(function (b) {
        b.addEventListener('click', function () {
          var l = b.getAttribute('data-lang');
          if (l !== lang) applyLang(l);
        });
      });

      /* ---------------- Cards ---------------- */
      var grid = $('#appGrid');
      function esc(s) { return String(s).replace(/[&<>"]/g, function (c) { return { '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;' }[c]; }); }

      function stateBits(app) {
        var t = I18N[lang];
        if (app.state === 'ok') return { cls: 'is-ok', led: 'ok', label: t['st.live'] };
        if (app.state === 'warn') return { cls: 'is-warn', led: 'warn', label: t['st.standby'] };
        return { cls: '', led: 'wait', label: t['st.check'] };
      }

      function renderCards() {
        var t = I18N[lang];
        var html = APPS.map(function (app, i) {
          var s = stateBits(app);
          var lat = app.ms != null ? t['meta.latency'].replace('{ms}', app.ms) : '—';
          return '<a class="card' + (app.state === 'warn' ? ' is-warn' : '') + '" data-app="' + i + '" href="' + app.url + '" aria-label="' + esc(app.slug) + ' — ' + t['card.open'] + '">'
            + '<div class="card-top">'
            + (app.icon ? '<img class="card-icon" src="' + esc(app.icon) + '" alt="" width="30" height="30" loading="lazy">' : '')
            + '<h3>' + esc(app.slug) + '</h3>'
            + '<span class="status-badge ' + s.cls + '"><span class="led ' + s.led + '"></span>' + s.label + '</span></div>'
            + '<p class="card-desc">' + esc(app.desc[lang]) + '</p>'
            + '<ul class="tags">' + app.tags.map(function (x) { return '<li>' + esc(x) + '</li>'; }).join('') + '</ul>'
            + '<div class="card-meta">'
            + '<span class="eq" aria-hidden="true"><span></span><span></span><span></span><span></span></span>'
            + '<span data-lat>' + lat + '</span>'
            + '<span data-ago></span>'
            + '<span class="card-arrow" aria-hidden="true">↗</span>'
            + '</div></a>';
        }).join('');
        html += '<div class="slot" aria-hidden="true"><span>' + esc(t['slot.next']) + '</span><span class="t-caret"></span></div>';
        var ns = grid.querySelector('noscript');
        grid.innerHTML = (ns ? ns.outerHTML : '') + html;
        if (finePointer && motionOK) attachTilt();
        tickAgo();
      }

      /* seconds-ago ticker — keeps the page feeling alive */
      function tickAgo() {
        var t = I18N[lang];
        APPS.forEach(function (app, i) {
          var el = $('[data-app="' + i + '"] [data-ago]', grid);
          if (!el) return;
          if (app.checkedAt == null) { el.textContent = ''; return; }
          var s = Math.max(0, Math.round((Date.now() - app.checkedAt) / 1000));
          el.textContent = t['meta.checked'].replace('{s}', s);
        });
      }
      setInterval(tickAgo, 1000);

      /* ---------------- Global status pill ---------------- */
      function renderSystem() {
        var t = I18N[lang];
        var led = $('#sysLed'), txt = $('#sysText');
        var done = APPS.every(function (a) { return a.state !== 'check'; });
        var up = APPS.filter(function (a) { return a.state === 'ok'; }).length;
        if (!done) {
          led.className = 'led wait';
          txt.innerHTML = '<b>' + t['sys.wait'] + '</b>';
        } else if (up === APPS.length) {
          led.className = 'led ok';
          txt.innerHTML = '<b>' + up + '/' + APPS.length + '</b> · ' + t['sys.ok'];
        } else {
          led.className = 'led warn';
          txt.innerHTML = '<b>' + up + '/' + APPS.length + '</b> · ' + t['sys.warn'];
        }
      }

      /* ---------------- Health checks (real pings) ---------------- */
      function checkApp(app) {
        if (!('fetch' in window)) { app.state = 'warn'; return Promise.resolve(); }
        var t0 = performance.now();
        return fetch(app.url, { method: 'HEAD', cache: 'no-store' })
          .then(function (res) {
            app.ms = Math.max(1, Math.round(performance.now() - t0));
            app.state = res.ok ? 'ok' : 'warn';
          })
          .catch(function () {
            app.ms = null;
            app.state = 'warn';
          })
          .then(function () { app.checkedAt = Date.now(); });
      }
      function checkAll() {
        Promise.all(APPS.map(checkApp)).then(function () {
          renderCards();
          renderSystem();
          fillTermTable();
        });
      }
      setInterval(checkAll, 30000);

      /* ---------------- Terminal ---------------- */
      var tCmd = $('#tCmd'), tOut = $('#tOut'), tCaret = $('#tCaret');
      function pad(s, n) { s = String(s); while (s.length < n) s += ' '; return s; }
      function termTable() {
        var rows = APPS.map(function (a) {
          var st = a.state === 'ok' ? 'live   ' : (a.state === 'warn' ? 'standby' : '…      ');
          var lat = a.ms != null ? a.ms + 'ms' : '—';
          return pad(a.slug, 24) + pad(st, 10) + lat;
        });
        return '\n' + pad('NAME', 24) + pad('STATUS', 10) + 'LATENCY\n' + rows.join('\n');
      }
      var termTyped = false;
      function fillTermTable() {
        if (!termTyped) return;
        tOut.innerHTML = '';
        var span = d.createElement('span');
        span.className = 't-out';
        span.textContent = termTable();
        tOut.appendChild(span);
        /* colour the live status */
        span.innerHTML = span.innerHTML.replace(/live {3}/g, '<span class="t-ok">live   </span>');
      }
      function typeCmd() {
        var txt = 'apps status';
        if (!motionOK) { tCmd.textContent = txt; termTyped = true; fillTermTable(); tCaret.hidden = false; return; }
        var i = 0;
        tCaret.hidden = false;
        (function tick() {
          if (i >= txt.length) {
            setTimeout(function () { termTyped = true; fillTermTable(); }, 300);
            return;
          }
          tCmd.textContent += txt.charAt(i++);
          setTimeout(tick, 55);
        })();
      }

      /* ---------------- Tilt + glare (same as main site) ---------------- */
      function attachTilt() {
        $$('.card', grid).forEach(function (card) {
          if (card.getAttribute('data-tilt')) return;
          card.setAttribute('data-tilt', '1');
          var MAX = 5;
          card.addEventListener('pointermove', function (e) {
            var r = card.getBoundingClientRect();
            var x = (e.clientX - r.left) / r.width;
            var y = (e.clientY - r.top) / r.height;
            card.style.setProperty('--mx', (x * 100).toFixed(1) + '%');
            card.style.setProperty('--my', (y * 100).toFixed(1) + '%');
            card.style.transform = 'perspective(700px) rotateX(' + ((0.5 - y) * 2 * MAX).toFixed(2) + 'deg) rotateY(' + ((x - 0.5) * 2 * MAX).toFixed(2) + 'deg) translateY(-3px)';
          });
          card.addEventListener('pointerleave', function () { card.style.transform = ''; });
        });
      }

      /* ---------------- Init ---------------- */
      $('#year').textContent = String(new Date().getFullYear());
      setTheme(window.matchMedia('(prefers-color-scheme: light)').matches ? 'light' : 'dark');
      applyLang((navigator.language || 'en').toLowerCase().indexOf('pt') === 0 ? 'pt' : 'en');
      typeCmd();
      checkAll();

    })();
  </script>
</body>

</html>
